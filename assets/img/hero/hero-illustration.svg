<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 480" fill="none" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="grad-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d6470"/>
      <stop offset="100%" stop-color="#1a8a9a"/>
    </linearGradient>
    <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#0d6470"/>
    </linearGradient>
    <linearGradient id="grad-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0d2540" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0d6470" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background glow orbs -->
  <circle cx="420" cy="140" r="120" fill="#0d6470" opacity="0.08"/>
  <circle cx="160" cy="320" r="90" fill="#00d4aa" opacity="0.06"/>
  <circle cx="500" cy="360" r="70" fill="#1a8a9a" opacity="0.07"/>

  <!-- Grid dots -->
  <g opacity="0.15">
    <circle cx="60" cy="60" r="2" fill="#0d6470"/>
    <circle cx="120" cy="60" r="2" fill="#0d6470"/>
    <circle cx="180" cy="60" r="2" fill="#0d6470"/>
    <circle cx="60" cy="120" r="2" fill="#0d6470"/>
    <circle cx="120" cy="120" r="2" fill="#0d6470"/>
    <circle cx="500" cy="80" r="2" fill="#0d6470"/>
    <circle cx="540" cy="80" r="2" fill="#0d6470"/>
    <circle cx="500" cy="120" r="2" fill="#0d6470"/>
    <circle cx="540" cy="120" r="2" fill="#0d6470"/>
    <circle cx="60" cy="420" r="2" fill="#0d6470"/>
    <circle cx="120" cy="420" r="2" fill="#0d6470"/>
    <circle cx="60" cy="460" r="2" fill="#0d6470"/>
  </g>

  <!-- Conexion lines entre nodos -->
  <g opacity="0.3" stroke="#0d6470" stroke-width="1.5">
    <line x1="290" y1="90" x2="430" y2="190" stroke-dasharray="4 4"/>
    <line x1="290" y1="90" x2="150" y2="200" stroke-dasharray="4 4"/>
    <line x1="430" y1="190" x2="480" y2="310" stroke-dasharray="4 4"/>
    <line x1="150" y1="200" x2="110" y2="330" stroke-dasharray="4 4"/>
    <line x1="430" y1="190" x2="310" y2="290" stroke-dasharray="4 4"/>
    <line x1="150" y1="200" x2="310" y2="290" stroke-dasharray="4 4"/>
    <line x1="310" y1="290" x2="480" y2="310" stroke-dasharray="4 4"/>
    <line x1="310" y1="290" x2="110" y2="330" stroke-dasharray="4 4"/>
  </g>

  <!-- Nodo central - Dashboard card -->
  <g transform="translate(180, 150)" filter="url(#soft-shadow)">
    <rect width="220" height="160" rx="16" fill="url(#grad-card)" stroke="#0d6470" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Header bar -->
    <rect width="220" height="36" rx="16" fill="#0d6470" opacity="0.4"/>
    <rect width="220" height="20" y="16" fill="#0d6470" opacity="0.4"/>
    <!-- Dots -->
    <circle cx="16" cy="18" r="4" fill="#ff5f57"/>
    <circle cx="30" cy="18" r="4" fill="#febc2e"/>
    <circle cx="44" cy="18" r="4" fill="#28c840"/>
    <!-- Title bar -->
    <rect x="60" y="13" width="80" height="10" rx="3" fill="#0d6470" opacity="0.6"/>

    <!-- Chart bars -->
    <rect x="20" y="100" width="20" height="40" rx="4" fill="url(#grad-primary)" opacity="0.9"/>
    <rect x="50" y="80" width="20" height="60" rx="4" fill="url(#grad-accent)" opacity="0.9"/>
    <rect x="80" y="90" width="20" height="50" rx="4" fill="url(#grad-primary)" opacity="0.7"/>
    <rect x="110" y="70" width="20" height="70" rx="4" fill="url(#grad-accent)" opacity="0.9"/>
    <rect x="140" y="85" width="20" height="55" rx="4" fill="url(#grad-primary)" opacity="0.8"/>
    <rect x="170" y="65" width="20" height="75" rx="4" fill="url(#grad-accent)" opacity="0.9"/>

    <!-- Line chart overlay -->
    <polyline points="20,90 50,72 80,80 110,60 140,68 200,45" stroke="#00d4aa" stroke-width="2" fill="none" opacity="0.7"/>
    <circle cx="200" cy="45" r="4" fill="#00d4aa" filter="url(#glow)"/>

    <!-- Stat chips -->
    <rect x="14" y="48" width="70" height="22" rx="6" fill="#0d6470" opacity="0.35"/>
    <text x="22" y="63" font-family="Inter, sans-serif" font-size="9" fill="#00d4aa" font-weight="600">+24% este mes</text>

    <rect x="90" y="48" width="55" height="22" rx="6" fill="#0d6470" opacity="0.35"/>
    <text x="98" y="63" font-family="Inter, sans-serif" font-size="9" fill="#7be8d6">En tiempo real</text>
  </g>

  <!-- Nodo flotante - integración API -->
  <g transform="translate(400, 170)" filter="url(#soft-shadow)">
    <rect width="150" height="110" rx="14" fill="url(#grad-card)" stroke="#1a8a9a" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="14" y="26" font-family="'Plus Jakarta Sans', sans-serif" font-size="10" fill="#7be8d6" font-weight="700">INTEGRACIÓN</text>

    <!-- API connection flow -->
    <rect x="12" y="36" width="50" height="28" rx="6" fill="#0d6470" opacity="0.5"/>
    <text x="20" y="54" font-family="monospace" font-size="9" fill="#00d4aa">API</text>

    <line x1="62" y1="50" x2="88" y2="50" stroke="#00d4aa" stroke-width="1.5" stroke-dasharray="3 2"/>
    <polygon points="88,46 96,50 88,54" fill="#00d4aa"/>

    <rect x="96" y="36" width="42" height="28" rx="6" fill="#0d6470" opacity="0.5"/>
    <text x="104" y="54" font-family="monospace" font-size="9" fill="#7be8d6">SYS</text>

    <!-- Status rows -->
    <rect x="12" y="76" width="126" height="1" fill="#0d6470" opacity="0.4"/>
    <circle cx="22" cy="90" r="4" fill="#28c840"/>
    <rect x="32" y="86" width="60" height="8" rx="3" fill="#0d6470" opacity="0.4"/>
    <circle cx="22" cy="104" r="4" fill="#28c840"/>
    <rect x="32" y="100" width="46" height="8" rx="3" fill="#0d6470" opacity="0.4"/>
  </g>

  <!-- Nodo flotante - automatización -->
  <g transform="translate(60, 250)" filter="url(#soft-shadow)">
    <rect width="140" height="100" rx="14" fill="url(#grad-card)" stroke="#0d6470" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="14" y="24" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" fill="#7be8d6" font-weight="700">AUTOMATIZACIÓN</text>

    <!-- Flow arrows -->
    <rect x="12" y="34" width="36" height="20" rx="6" fill="#0d6470" opacity="0.6"/>
    <text x="18" y="48" font-family="monospace" font-size="8" fill="#00d4aa">INICIO</text>

    <line x1="48" y1="44" x2="60" y2="44" stroke="#0d6470" stroke-width="1.5"/>
    <polygon points="60,41 66,44 60,47" fill="#0d6470" opacity="0.8"/>

    <rect x="66" y="34" width="28" height="20" rx="6" fill="#1a8a9a" opacity="0.6"/>
    <text x="73" y="48" font-family="monospace" font-size="8" fill="#fff">AUTO</text>

    <line x1="94" y1="44" x2="106" y2="44" stroke="#00d4aa" stroke-width="1.5"/>
    <polygon points="106,41 112,44 106,47" fill="#00d4aa"/>

    <rect x="112" y="34" width="18" height="20" rx="6" fill="#00d4aa" opacity="0.3"/>
    <text x="116" y="48" font-family="monospace" font-size="8" fill="#00d4aa">OK</text>

    <!-- Checks -->
    <line x1="12" y1="68" x2="130" y2="68" stroke="#0d6470" stroke-width="0.8" opacity="0.3"/>
    <circle cx="22" cy="80" r="4" fill="#28c840" opacity="0.8"/>
    <rect x="32" y="76" width="56" height="8" rx="3" fill="#0d6470" opacity="0.3"/>
    <circle cx="22" cy="92" r="4" fill="#28c840" opacity="0.8"/>
    <rect x="32" y="88" width="42" height="8" rx="3" fill="#0d6470" opacity="0.3"/>
  </g>

  <!-- Nodo flotante - código -->
  <g transform="translate(380, 310)" filter="url(#soft-shadow)">
    <rect width="160" height="120" rx="14" fill="url(#grad-card)" stroke="#0d6470" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- Code header -->
    <rect width="160" height="28" rx="14" fill="#0d6470" opacity="0.4"/>
    <rect width="160" height="14" y="14" fill="#0d6470" opacity="0.4"/>
    <circle cx="14" cy="14" r="4" fill="#ff5f57" opacity="0.8"/>
    <circle cx="26" cy="14" r="4" fill="#febc2e" opacity="0.8"/>
    <circle cx="38" cy="14" r="4" fill="#28c840" opacity="0.8"/>

    <!-- Code lines -->
    <rect x="14" y="38" width="30" height="7" rx="2" fill="#1a8a9a" opacity="0.8"/>
    <rect x="50" y="38" width="55" height="7" rx="2" fill="#7be8d6" opacity="0.6"/>

    <rect x="22" y="52" width="20" height="7" rx="2" fill="#00d4aa" opacity="0.7"/>
    <rect x="48" y="52" width="40" height="7" rx="2" fill="#0d6470" opacity="0.5"/>
    <rect x="94" y="52" width="28" height="7" rx="2" fill="#7be8d6" opacity="0.5"/>

    <rect x="22" y="66" width="35" height="7" rx="2" fill="#1a8a9a" opacity="0.6"/>
    <rect x="63" y="66" width="60" height="7" rx="2" fill="#0d6470" opacity="0.4"/>

    <rect x="14" y="80" width="25" height="7" rx="2" fill="#00d4aa" opacity="0.8"/>
    <rect x="45" y="80" width="45" height="7" rx="2" fill="#7be8d6" opacity="0.5"/>

    <rect x="14" y="96" width="80" height="7" rx="2" fill="#0d6470" opacity="0.35"/>
    <rect x="100" y="96" width="40" height="7" rx="2" fill="#1a8a9a" opacity="0.5"/>
  </g>

  <!-- Nodos circulares (puntos de conexión) -->
  <circle cx="290" cy="90" r="10" fill="#0d6470" opacity="0.8" filter="url(#glow)"/>
  <circle cx="290" cy="90" r="6" fill="#00d4aa"/>

  <circle cx="310" cy="290" r="8" fill="#1a8a9a" opacity="0.9" filter="url(#glow)"/>
  <circle cx="310" cy="290" r="4" fill="#00d4aa"/>

  <!-- Partículas flotantes -->
  <circle cx="360" cy="120" r="3" fill="#00d4aa" opacity="0.6" filter="url(#glow)"/>
  <circle cx="140" cy="170" r="2.5" fill="#0d6470" opacity="0.7"/>
  <circle cx="520" cy="250" r="3" fill="#00d4aa" opacity="0.5"/>
  <circle cx="100" cy="180" r="2" fill="#1a8a9a" opacity="0.6"/>
  <circle cx="460" cy="400" r="3" fill="#0d6470" opacity="0.5"/>
  <circle cx="200" cy="400" r="2.5" fill="#00d4aa" opacity="0.4"/>

  <!-- Badge flotante - "+24%" -->
  <g transform="translate(330, 50)">
    <rect width="72" height="26" rx="13" fill="#00d4aa" opacity="0.15" stroke="#00d4aa" stroke-width="1"/>
    <text x="14" y="17" font-family="Inter, sans-serif" font-size="11" fill="#00d4aa" font-weight="700">+24% ROI</text>
  </g>
</svg>
