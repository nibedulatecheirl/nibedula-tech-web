<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="65%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0d6470" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#07111e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#0d6470" stroke-width="0.6" opacity="0.35"/>
    </pattern>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00d4aa" stop-opacity="1"/>
      <stop offset="70%" stop-color="#00d4aa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-card">
      <rect x="72" y="210" width="520" height="200" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#07111e"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Right panel — decorative code/dashboard block -->
  <rect x="720" y="100" width="420" height="430" rx="16" fill="#0a1628" stroke="#0d6470" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Window chrome -->
  <rect x="720" y="100" width="420" height="44" rx="16" fill="#0d1f35"/>
  <rect x="720" y="128" width="420" height="16" fill="#0d1f35"/>
  <circle cx="752" cy="122" r="6" fill="#094a54"/>
  <circle cx="774" cy="122" r="6" fill="#0d6470"/>
  <circle cx="796" cy="122" r="6" fill="#1a8a9a"/>
  <!-- Code lines -->
  <rect x="744" y="168" width="200" height="8" rx="4" fill="#0d6470" fill-opacity="0.5"/>
  <rect x="760" y="188" width="280" height="8" rx="4" fill="#0d6470" fill-opacity="0.3"/>
  <rect x="760" y="208" width="140" height="8" rx="4" fill="#00d4aa" fill-opacity="0.4"/>
  <rect x="744" y="228" width="240" height="8" rx="4" fill="#0d6470" fill-opacity="0.3"/>
  <rect x="760" y="248" width="180" height="8" rx="4" fill="#0d6470" fill-opacity="0.5"/>
  <rect x="760" y="268" width="300" height="8" rx="4" fill="#00d4aa" fill-opacity="0.25"/>
  <rect x="744" y="288" width="220" height="8" rx="4" fill="#0d6470" fill-opacity="0.3"/>
  <rect x="760" y="308" width="160" height="8" rx="4" fill="#0d6470" fill-opacity="0.5"/>
  <!-- Separator -->
  <line x1="744" y1="336" x2="1116" y2="336" stroke="#0d6470" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Mini bar chart -->
  <rect x="760" y="390" width="20" height="60" rx="3" fill="#0d6470" fill-opacity="0.5"/>
  <rect x="790" y="368" width="20" height="82" rx="3" fill="#1a8a9a" fill-opacity="0.6"/>
  <rect x="820" y="380" width="20" height="70" rx="3" fill="#0d6470" fill-opacity="0.5"/>
  <rect x="850" y="352" width="20" height="98" rx="3" fill="#00d4aa" fill-opacity="0.55"/>
  <rect x="880" y="372" width="20" height="78" rx="3" fill="#1a8a9a" fill-opacity="0.6"/>
  <rect x="910" y="362" width="20" height="88" rx="3" fill="#0d6470" fill-opacity="0.5"/>
  <rect x="940" y="345" width="20" height="105" rx="3" fill="#00d4aa" fill-opacity="0.7"/>
  <rect x="970" y="370" width="20" height="80" rx="3" fill="#1a8a9a" fill-opacity="0.6"/>
  <!-- Trend line -->
  <polyline points="770,420 800,405 830,415 860,393 890,408 920,398 950,382 980,400" fill="none" stroke="#00d4aa" stroke-width="2" stroke-opacity="0.8"/>
  <!-- Chart label -->
  <rect x="760" y="468" width="80" height="6" rx="3" fill="#0d6470" fill-opacity="0.4"/>
  <rect x="850" y="468" width="60" height="6" rx="3" fill="#0d6470" fill-opacity="0.3"/>

  <!-- Left content — brand -->
  <!-- Logo mark (simplified hummingbird shape) -->
  <g transform="translate(72, 96)">
    <circle cx="24" cy="24" r="24" fill="#0d6470" fill-opacity="0.15"/>
    <circle cx="24" cy="24" r="24" fill="none" stroke="#0d6470" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- simplified hummingbird silhouette -->
    <ellipse cx="24" cy="22" rx="7" ry="4" fill="#00d4aa" fill-opacity="0.9" transform="rotate(-25 24 22)"/>
    <ellipse cx="30" cy="18" rx="9" ry="3" fill="#1a8a9a" fill-opacity="0.8" transform="rotate(-15 30 18)"/>
    <ellipse cx="18" cy="26" rx="6" ry="2" fill="#0d6470" fill-opacity="0.9" transform="rotate(10 18 26)"/>
  </g>

  <!-- Company name -->
  <text x="140" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#5a6a7e" fill-opacity="0.9">NIBEDULA</text>
  <text x="336" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" letter-spacing="3" fill="#00d4aa">TECH</text>

  <!-- Accent line under name -->
  <rect x="140" y="134" width="240" height="1.5" fill="url(#accent-line)" opacity="0.6"/>

  <!-- Main headline -->
  <text x="72" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5" fill="#ffffff">Soluciones</text>
  <text x="72" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5" fill="#ffffff">tecnológicas</text>
  <text x="72" y="366" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" letter-spacing="-1.5" fill="#00d4aa">a tu medida</text>

  <!-- Subline -->
  <text x="72" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#5a6a7e">Software · Automatización · BI · Integraciones · Importaciones</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#0a1628"/>
  <text x="72" y="612" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#5a6a7e">www.nibedulatech.com</text>
  <text x="1128" y="612" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#00d4aa" text-anchor="end">Tacna · Perú</text>
</svg>
